<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=Fira+Code:wght@300..700&family=Jersey+15&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&display=swap"
      rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&family=Jersey+15&display=swap"
      rel="stylesheet">
    <title>Solid App</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        transition-duration: 200ms;
      }

      html,
      body {
        height: 100dvh;
        width: 100dvw;
        margin: 0;
        padding: 0;
      }

      #root {
        height: 100%;
        width: 100%;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
        color: inherit;
        background: transparent;
        border: 0;
        border-radius: 0;
        box-shadow: none;
        outline: none;
        appearance: none;
        -webkit-appearance: none;
        margin: 0;
        padding: 0;
      }

      button {
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
      }

      button::-moz-focus-inner {
        border: 0;
      }

      a:visited {
        color: inherit;
      }

      img,
      svg,
      video,
      canvas {
        display: block;
        max-width: 100%;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <script src="/src/index.tsx" type="module"></script>
  </body>
</html>
