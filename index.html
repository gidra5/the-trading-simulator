<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=Fira+Code:wght@300..700&family=Jersey+15&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&family=Jersey+15&display=swap"
      rel="stylesheet"
    />
    <title>Solid App</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        transition-duration: 200ms;
      }

      html,
      body {
        height: 100dvh;
        width: 100dvw;
        margin: 0;
        padding: 0;
      }

      #root {
        height: 100%;
        width: 100%;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
        color: inherit;
        background: transparent;
        border: 0;
        border-radius: 0;
        box-shadow: none;
        outline: none;
        appearance: none;
        -webkit-appearance: none;
        margin: 0;
        padding: 0;
      }

      button {
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
      }

      button::-moz-focus-inner {
        border: 0;
      }

      input[type="range"] {
        --range-progress: 0%;
        --range-fill-color: currentColor;
        --range-thumb-size: 1rem;
        --range-thumb-color: currentColor;
        --range-track-color: currentColor;
        --range-track-height: 0.375rem;
        background: linear-gradient(
            to right,
            var(--range-fill-color) 0%,
            var(--range-fill-color) var(--range-progress),
            var(--range-track-color) var(--range-progress),
            var(--range-track-color) 100%
          )
          center / 100% var(--range-track-height) no-repeat;
        border-radius: 999px;
      }

      input[type="range"]::-moz-range-progress {
        height: var(--range-track-height);
        border-radius: 999px;
        background: var(--range-fill-color);
      }

      input[type="range"]::-moz-range-thumb {
        height: var(--range-thumb-size);
        width: var(--range-thumb-size);
        border: 0;
        border-radius: 999px;
        background: var(--range-thumb-color);
        opacity: var(--range-thumb-opacity, 1);
        transition: opacity 200ms;
      }

      input[type="range"]::-moz-range-track {
        height: var(--range-track-height);
        border-radius: 999px;
        background: transparent;
      }

      input[type="range"]::-webkit-slider-runnable-track {
        height: var(--range-track-height);
        border-radius: 999px;
        background: transparent;
      }

      input[type="range"]::-webkit-slider-thumb {
        height: var(--range-thumb-size);
        width: var(--range-thumb-size);
        margin-top: calc((var(--range-track-height) - var(--range-thumb-size)) / 2);
        border-radius: 999px;
        background: var(--range-thumb-color);
        opacity: var(--range-thumb-opacity, 1);
        transition: opacity 200ms;
        -webkit-appearance: none;
        appearance: none;
      }

      [data-popover-content] {
        transform-origin: var(--popover-transform-origin);
      }

      [data-popover-state="open"] {
        animation: popover-enter 160ms ease-out;
      }

      [data-popover-state="closing"] {
        animation: popover-exit 120ms ease-in forwards;
        pointer-events: none;
      }

      [data-popover-placement="bottom"] {
        --popover-enter-y: -0.25rem;
        --popover-transform-origin: top;
      }

      [data-popover-placement="top"] {
        --popover-enter-y: 0.25rem;
        --popover-transform-origin: bottom;
      }

      @keyframes popover-enter {
        from {
          opacity: 0;
          transform: translateY(var(--popover-enter-y)) scale(0.98);
        }

        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @keyframes popover-exit {
        from {
          opacity: 1;
          transform: translateY(0) scale(1);
        }

        to {
          opacity: 0;
          transform: translateY(var(--popover-enter-y)) scale(0.98);
        }
      }

      [data-dialog-backdrop][data-dialog-state="open"] {
        animation: dialog-backdrop-enter 180ms ease-out;
      }

      [data-dialog-backdrop][data-dialog-state="closing"] {
        animation: dialog-backdrop-exit 140ms ease-in forwards;
        pointer-events: none;
      }

      [data-dialog-content][data-dialog-state="open"] {
        animation: dialog-content-enter 180ms ease-out;
      }

      [data-dialog-content][data-dialog-state="closing"] {
        animation: dialog-content-exit 140ms ease-in forwards;
      }

      @keyframes dialog-backdrop-enter {
        from {
          opacity: 0;
        }

        to {
          opacity: 1;
        }
      }

      @keyframes dialog-backdrop-exit {
        from {
          opacity: 1;
        }

        to {
          opacity: 0;
        }
      }

      @keyframes dialog-content-enter {
        from {
          opacity: 0;
          transform: translateY(0.375rem) scale(0.98);
        }

        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @keyframes dialog-content-exit {
        from {
          opacity: 1;
          transform: translateY(0) scale(1);
        }

        to {
          opacity: 0;
          transform: translateY(0.375rem) scale(0.98);
        }
      }

      a:visited {
        color: inherit;
      }

      img,
      svg,
      video,
      canvas {
        display: block;
        max-width: 100%;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <script src="/src/index.tsx" type="module"></script>
  </body>
</html>
